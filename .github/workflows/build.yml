name: Build

on:
  push:
  pull_request:

jobs:
  build-deb:
    # Genuinely arm64 hardware (no QEMU), matching Dockerfile.native-arm64 —
    # the cgo build against libvpx links against genuine native arm64
    # libvpx headers/libs, no cross sysroot or PKG_CONFIG_LIBDIR dance
    # needed. Also lets go test actually run.
    runs-on: ubuntu-24.04-arm
    env:
      R2_BUCKET: aipicam-test-packages
      AWS_DEFAULT_REGION: auto
      AWS_EC2_METADATA_DISABLED: "true"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential debhelper devscripts reprepro gnupg \
            pkg-config libvpx-dev curl ca-certificates unzip

      - name: Install AWS CLI
        run: |
          if command -v aws >/dev/null 2>&1; then
            echo "AWS CLI already present: $(aws --version)"
          else
            curl -fsSL "https://awscli.amazonaws.com/awscli-exe-linux-aarch64.zip" -o awscliv2.zip
            unzip -q awscliv2.zip
            sudo ./aws/install
          fi

      - name: Determine target apt distribution
        id: dist
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "codename=main" >> "$GITHUB_OUTPUT"
          else
            echo "codename=nightly" >> "$GITHUB_OUTPUT"
          fi

      - name: Stamp build-time version for nightly builds
        if: ${{ steps.dist.outputs.codename == 'nightly' }}
        env:
          DEBEMAIL: jhanekom@gmail.com
          DEBFULLNAME: Jaco Hanekom
        run: |
          BASEVER="$(dpkg-parsechangelog -S Version)"
          TS="$(date -u +%Y%m%d.%H%M%S)"
          dch --newversion "${BASEVER}+${TS}" --distribution stable --force-distribution \
            "Automated CI build (UTC ${TS})."

      # -d skips dpkg-checkbuilddeps' check for the golang-go *package*
      # specifically, since Go is supplied via actions/setup-go instead
      # (same reason Dockerfile.native-arm64 passes -d).
      - name: Build package
        run: dpkg-buildpackage -us -uc -b -d

      - name: Collect build artifacts
        run: |
          mkdir dist
          cp ../*.deb ../*.changes ../*.buildinfo dist/

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: picam-orchestrator-deb
          path: dist/*

      - name: Import GPG signing key
        run: printf '%s' "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import

      - name: Render reprepro config
        run: |
          mkdir -p apt-repo/conf
          sed "s/__GPG_KEY_ID__/${{ secrets.GPG_KEY_ID }}/" \
            .github/reprepro/distributions.tmpl > apt-repo/conf/distributions

      - name: Fetch existing repo state from R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync "s3://${R2_BUCKET}" apt-repo \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --exclude "conf/*"

      - name: Add package to repo
        run: reprepro -b apt-repo includedeb ${{ steps.dist.outputs.codename }} dist/*.deb

      - name: Export public key
        run: gpg --export --armor "${{ secrets.GPG_KEY_ID }}" > apt-repo/pubkey.asc

      - name: Publish repo to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          aws s3 sync apt-repo "s3://${R2_BUCKET}" \
            --endpoint-url "https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com" \
            --exclude "conf/*" --delete
