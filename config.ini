; ╔══════════════════════════════════════════════════════════╗
; ║          picam-orchestrator  –  configuration file              ║
; ║          (main / lores / annotated stream selector)       ║
; ╚══════════════════════════════════════════════════════════╝

; ── Raw video input (picam-raw) ───────────────────────────────
; main_port/main_width/main_height, lores_port/lores_width/lores_height,
; and [telemetry] port/command_port below all default from the shared
; /etc/aipicam/streams.conf (aipicam-config package) instead of being
; set here — picam-raw's UDP wire protocol carries no width/height
; field, so every reader has to already agree with what picam-raw
; actually sends, and hand-copying that agreement into every package's
; own config is exactly what silently drifted apart before (this file
; shipped 1920x1080 for main while picam-raw sends 2304x1296). Set any
; of those keys here to explicitly override the shared file for local
; debugging; otherwise leave them unset and edit the shared file.
[input]
host         = 127.0.0.1

ping_every   = 5                   ; seconds between UDP registration pings to picam-raw

; ── Detection input (picam-hailo) ─────────────────────────────
[detections]
host          = 127.0.0.1
port          = 8558               ; picam-hailo detection stream
tolerance_ms  = 150                ; max time difference to match a detection to a frame

; ── Telemetry input (picam-raw) ───────────────────────────────
[telemetry]
host          = 127.0.0.1
; port / command_port default from the shared streams.conf (see [input] above)

; ── Delay (applied to whichever resolution has annotation on) ─
[delay]
delay_ms    = 1000                 ; how long to hold frames before annotating + sending

; ── Annotation (per-resolution, toggleable live via /annotate) ─
[annotate]
lores = false                      ; startup default — overridden by ui_state's persisted value if one exists
main  = false                      ; startup default — overridden by ui_state's persisted value if one exists
; Toggle either at runtime with no restart needed:
;   GET /annotate?lores=true|false
;   GET /annotate?main=true|false
; When ON for a resolution: that resolution is delayed by delay_ms
; above, matched against picam-hailo detections, and boxes are drawn.
; When OFF: that resolution stays fully live with zero added latency.
; Global per resolution — every viewer of that resolution sees the
; same thing, there is no per-client override. A runtime change is
; PERSISTED (see [ui_state] below), so it survives a service restart.

; ── Stream + snapshot encoding ─────────────────────────────────
[encode]
; VP8 (WebRTC live stream) is bitrate-driven, not quality-driven like
; the WebP/JPEG scale below — this is a target for libvpx's constant
; bitrate (CBR) rate control, not a hard cap.
;
; Main streams at its native capture resolution always (no downscale —
; [input] main_width/main_height is exactly what goes out over WebRTC,
; same as what picam-recorder/EventRecorder already used). It's encoded
; as two simultaneous, independently-bitrated streams of that same
; native frame: "high" is what a detail-view browser starts on, "low" is
; what picam-frontend moves a struggling viewer to based on that
; viewer's own real connection quality (see relay.viewer.adaptQuality in
; picam-frontend-go) — never a resolution drop, always native, just a
; lower bitrate/quality encode of it.
vp8_bitrate_main_high_kbps = 3000
vp8_bitrate_main_low_kbps  = 800
vp8_bitrate_lores_kbps     = 500
; VP8 realtime encode speed (VP8E_SET_CPUUSED): higher = faster encode,
; lower quality (roughly 4-16). Main runs as two simultaneous
; native-resolution encodes (see above), so it defaults faster to keep
; both within the real-time budget; raise it further if the logs still
; show "main encode (both tiers) took ... longer than the tick interval".
vp8_cpu_used_main      = 12
vp8_cpu_used_lores     = 8
jpeg_quality          = 80         ; 1-100, EventRecorder's saved snapshot files only — not the live stream
; output_fps_live governs the default, zero-added-latency view (no delay
; buffer, no detection matching) -- kept at picam-raw's own capture rate
; so "live" actually means real time. output_fps_annotated is lower
; priority for real-time-ness since that view already carries ~1s of
; intentional delay for detection matching; if the Pi can't keep up at
; 30fps here (watch the journal for "falling behind real time"), lower
; vp8_cpu_used_main/lores or this value before touching output_fps_live.
output_fps_live       = 30         ; throttle for main/lores when selected
output_fps_annotated  = 30         ; throttle for the annotated stream when selected

; ── WebRTC (live stream transport) ──────────────────────────────
[webrtc]
ice_port_min = 50000
ice_port_max = 50100
; No STUN/TURN by default — picam-frontend always relays (see its own
; config), so there is no direct Pi<->browser path here: ICE only ever
; needs to negotiate a route between two processes on the same LAN.
; Uncomment if a future deployment needs a Pi reachable directly across
; a NAT/WAN boundary without a relay in between.
; stun_server = stun:stun.l.google.com:19302

; ── On-screen display ─────────────────────────────────────────
; Burns camera ID + a wall-clock timestamp directly into the video
; frame pixels (bottom-left / bottom-right). Applies to all three
; streams (main, lores, annotated). Off by default — most viewers
; already see this in the picam-frontend sidebar, so this is mainly
; useful if the raw stream itself needs to carry that information
; (e.g. recording the proxied stream downstream, or viewing the
; stream URL directly outside picam-frontend).
[osd]
; Two independent toggles — camera ID (bottom-left) and timestamp
; (bottom-right) can be turned on/off separately. These are startup
; defaults, overridden by ui_state's persisted value if one exists —
; can be toggled live at runtime via GET /osd with
; ?camera_id=true|false and/or &time=true|false, no restart needed
; (affects all viewers/streams on this Pi). A legacy combined
; ?enabled=true|false is still accepted and sets both at once. A
; runtime change is PERSISTED (see [ui_state] below), so it survives
; a service restart.
camera_id      = false
time           = false
; Optional comma-separated display names, one per camera index.
; If omitted (or a camera's slot is left blank), that camera's bare
; numeric index is shown instead. Example with two cameras:
;   camera_labels = Front,Back
camera_labels  =

; ── Automatic lens switching by ambient light ──────────────────
[lux_switch]
; When enabled, this process watches picam-raw's own lux telemetry and
; switches its active camera automatically: above the threshold ->
; camera 0, below it -> camera 1 (with hysteresis + a cooldown between
; switches, so it doesn't flap right at the boundary). These are startup
; defaults only -- the live values are configured at runtime via GET
; /lux-switch with ?enabled=true|false and/or &threshold=<int>, no
; restart needed, and are PERSISTED to state_dir below so a runtime
; change survives a service restart.
enabled    = false
threshold  = 50                           ; lux units -- tune to your camera/environment
state_dir  = /var/lib/picam-orchestrator  ; where the live-configured value is saved

; ── Automatic infrared light by relay ───────────────────────────
[ir_light]
; When enabled, this process watches picam-raw's own lux telemetry and
; switches a relay wired to an IR illuminator via pi-relay-control
; (running locally on this same Pi -- relay_host/relay_port below):
; below the threshold (dark) the relay turns on, above it (bright) it
; turns off, with the same hysteresis + cooldown as [lux_switch] above
; to avoid flapping/chatter. max_on_minutes caps how long the relay may
; stay continuously on as a hardware safety limit -- once hit, it stays
; off for the rest of that dark period and only re-arms once lux rises
; back above the threshold and drops below it again. These are startup
; defaults only -- the live values are configured at runtime via GET
; /ir-light with ?enabled=true|false, &threshold=<int>, and/or
; &max_on_minutes=<int>, no restart needed, and are PERSISTED to
; state_dir below so a runtime change survives a service restart.
enabled        = false
threshold      = 50                       ; lux units -- below this, turn the IR light on
max_on_minutes = 0                        ; safety cap on continuous on-time; 0 = no cap
relay_host     = 127.0.0.1                ; pi-relay-control runs locally on this same Pi
relay_port     = 7778                     ; pi-relay-control's default port
state_dir      = /var/lib/picam-orchestrator

; ── Persisted Settings-page state (OSD, annotate, lens) ─────────
[ui_state]
; picam-frontend's Settings page controls -- Overlay (camera_id/time
; above), Annotate (main/lores above), and Lens (the active camera,
; via /camera) -- are all PERSISTED here, exactly like [lux_switch]
; above, so they survive a service restart instead of resetting to
; the startup defaults in [osd]/[annotate]. On startup, if a saved
; lens preference exists and differs from whatever picam-raw currently
; reports, this process switches to it once telemetry connects.
state_dir = /var/lib/picam-orchestrator

; ── Discovery (lets picam-frontend find this Pi automatically) ──
; Advertises this process over mDNS/DNS-SD (Zeroconf/Bonjour) as
; "_picam-orchestrator._tcp.local." so picam-frontend can discover it on
; the LAN without a static [pis] entry on the frontend side. Requires
; both processes to be on the same mDNS-reachable network segment
; (typically: same L2 broadcast domain / VLAN).
[discovery]
enabled = true   ; advertise this Pi via mDNS
name    =        ; short id used in picam-frontend's ?pi=NAME URLs; blank = OS hostname
label   =        ; display label shown in picam-frontend's UI; blank = same as name

; ── Output ──────────────────────────────────────────────────
[output]
http_port       = 81               ; open http://<pi-ip>:81 in a browser directly,
                                    ; or via picam-frontend's proxy (default port 80)
                                    ; binding ports below 1024 needs root or
                                    ; CAP_NET_BIND_SERVICE (already granted in the
                                    ; systemd service file); change freely if needed
status_port     = 8091             ; echo status | nc 127.0.0.1 8091
default_stream  = main             ; which resolution loads first: main or lores
                                    ; (annotation is a separate toggle, see [annotate]
                                    ; above — it doesn't change which resolution this is)
                                    ; (main has no artificial delay, so it's the
                                    ;  fastest to appear on first page load)

; ── Recorder integration (picam-recorder) ──────────────────────────────────
[recorder]
host       = 127.0.0.1
port       = 8080              ; picam-recorder TCP control port
idle_secs  = 30                ; seconds of no detections before stopping recording
