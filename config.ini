; ╔══════════════════════════════════════════════════════════╗
; ║          picam-orchestrator  –  configuration file              ║
; ║          (main / lores / annotated stream selector)       ║
; ╚══════════════════════════════════════════════════════════╝

; ── Raw video input (picam-raw) ───────────────────────────────
; main_port/main_width/main_height, lores_port/lores_width/lores_height,
; and [telemetry] port/command_port below all default from the shared
; /etc/aipicam/streams.conf (aipicam-config package) instead of being
; set here — picam-raw's UDP wire protocol carries no width/height
; field, so every reader has to already agree with what picam-raw
; actually sends, and hand-copying that agreement into every package's
; own config is exactly what silently drifted apart before (this file
; shipped 1920x1080 for main while picam-raw sends 2304x1296). Set any
; of those keys here to explicitly override the shared file for local
; debugging; otherwise leave them unset and edit the shared file.
[input]
host         = 127.0.0.1

ping_every   = 5                   ; seconds between UDP registration pings to picam-raw

; ── Detection input (picam-hailo) ─────────────────────────────
[detections]
host          = 127.0.0.1
port          = 8558               ; picam-hailo detection stream
tolerance_ms  = 150                ; max time difference to match a detection to a frame

; ── Telemetry input (picam-raw) ───────────────────────────────
[telemetry]
host          = 127.0.0.1
; port / command_port default from the shared streams.conf (see [input] above)

; ── Delay (applied to whichever resolution has annotation on) ─
[delay]
delay_ms    = 1000                 ; how long to hold frames before annotating + sending

; ── Annotation (per-resolution, toggleable live via /annotate) ─
[annotate]
lores = false                      ; startup default — live (no delay, no boxes)
main  = false                      ; startup default — live (no delay, no boxes)
; Toggle either at runtime with no restart needed:
;   GET /annotate?lores=true|false
;   GET /annotate?main=true|false
; When ON for a resolution: that resolution is delayed by delay_ms
; above, matched against picam-hailo detections, and boxes are drawn.
; When OFF: that resolution stays fully live with zero added latency.
; Global per resolution — every viewer of that resolution sees the
; same thing, there is no per-client override.

; ── Stream + snapshot encoding ─────────────────────────────────
; The live streams are plain MJPEG over HTTP (multipart/x-mixed-replace)
; — no WebRTC/ICE, no persistent encoder state, since every JPEG frame
; is independent. Chosen over VP8 because VP8 has no hardware encode
; path on any Raspberry Pi and software VP8 (motion estimation,
; inter-frame prediction) was overloading the CPU; JPEG has neither, so
; it's inherently far cheaper even in pure software.
[encode]
mjpeg_quality_main  = 80          ; 1-100, live main stream
mjpeg_quality_lores = 70          ; 1-100, live lores stream
jpeg_quality        = 80          ; 1-100, EventRecorder's saved snapshot files only — not the live stream
output_fps_live       = 15         ; throttle for main/lores when selected
output_fps_annotated  = 30         ; throttle for the annotated stream when selected

; Caps the resolution the main stream is actually encoded/displayed at
; — independent of [input] main_width/main_height, which is the
; camera's native capture resolution (still used unchanged for
; picam-recorder's recordings and EventRecorder's snapshots). Each frame
; is downscaled (preserving aspect ratio, never upscaled) to fit within
; this box before JPEG encoding, so raising the capture resolution for
; sharper recordings doesn't also force everyone's live view to decode a
; bigger, more expensive stream. Set either to 0 to disable the cap
; entirely (main streams at native capture resolution, like before this
; setting existed).
main_display_max_width  = 1920
main_display_max_height = 1080

; ── On-screen display ─────────────────────────────────────────
; Burns camera ID + a wall-clock timestamp directly into the video
; frame pixels (bottom-left / bottom-right). Applies to all three
; streams (main, lores, annotated). Off by default — most viewers
; already see this in the picam-frontend sidebar, so this is mainly
; useful if the raw stream itself needs to carry that information
; (e.g. recording the proxied stream downstream, or viewing the
; stream URL directly outside picam-frontend).
[osd]
; Two independent toggles — camera ID (bottom-left) and timestamp
; (bottom-right) can be turned on/off separately. These are startup
; defaults only — can be toggled live at runtime via GET /osd with
; ?camera_id=true|false and/or &time=true|false, no restart needed
; (affects all viewers/streams on this Pi). A legacy combined
; ?enabled=true|false is still accepted and sets both at once.
camera_id      = false
time           = false
; Optional comma-separated display names, one per camera index.
; If omitted (or a camera's slot is left blank), that camera's bare
; numeric index is shown instead. Example with two cameras:
;   camera_labels = Front,Back
camera_labels  =

; ── Output ──────────────────────────────────────────────────
[output]
http_port       = 81               ; open http://<pi-ip>:81 in a browser directly,
                                    ; or via picam-frontend's proxy (default port 80)
                                    ; binding ports below 1024 needs root or
                                    ; CAP_NET_BIND_SERVICE (already granted in the
                                    ; systemd service file); change freely if needed
status_port     = 8091             ; echo status | nc 127.0.0.1 8091
default_stream  = main             ; which resolution loads first: main or lores
                                    ; (annotation is a separate toggle, see [annotate]
                                    ; above — it doesn't change which resolution this is)
                                    ; (main has no artificial delay, so it's the
                                    ;  fastest to appear on first page load)

; ── Recorder integration (picam-recorder) ──────────────────────────────────
[recorder]
host       = 127.0.0.1
port       = 8080              ; picam-recorder TCP control port
idle_secs  = 30                ; seconds of no detections before stopping recording
